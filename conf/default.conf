# =============================================================================
# default.conf — fusion des anciennes default.conf + demo.conf + tester.conf
#
# Un seul serveur sur le port 8080 qui respecte en même temps :
#   - les exigences du tester binaire officiel 42 (./tester http://localhost:8080)
#   - la suite de tests HTML maison (www/default/, http://localhost:8080/default/)
#   - les notes d'étude du projet (www/webserv-studies/, /webserv-studies/)
#
# Usage : ./webserv conf/default.conf
#   Tester officiel :  ./tester http://localhost:8080
#   Suite de tests :   http://localhost:8080/default/
#   Notes d'étude :    http://localhost:8080/webserv-studies/
# =============================================================================

server {
	listen 8080;

	server_name all;

	client_max_body_size 10m;

	root www;

	# Pages d'erreur personnalisées
	error_page 400 /home/eahmeti/Documents/webserv/www/default/errors/400.html;
	error_page 403 /home/eahmeti/Documents/webserv/www/default/errors/403.html;
	error_page 404 /home/eahmeti/Documents/webserv/www/default/errors/404.html;
	error_page 405 /home/eahmeti/Documents/webserv/www/default/errors/405.html;
	error_page 413 /home/eahmeti/Documents/webserv/www/default/errors/413.html;
	error_page 431 /home/eahmeti/Documents/webserv/www/default/errors/431.html;
	error_page 500 /home/eahmeti/Documents/webserv/www/default/errors/500.html;
	error_page 501 /home/eahmeti/Documents/webserv/www/default/errors/501.html;
	error_page 502 /home/eahmeti/Documents/webserv/www/default/errors/502.html;
	error_page 504 /home/eahmeti/Documents/webserv/www/default/errors/504.html;

	# --- exigence tester officiel : "/" doit répondre UNIQUEMENT à GET ---
	location / {
		root            www;
		index           index.html;
		autoindex       off;
		allowed_methods GET;
	}

	# --- exigence tester officiel : /post_body répond à POST, maxBody 100 ---
	location /post_body {
		root                 www;
		allowed_methods      POST;
		client_max_body_size 100;
	}

	# --- exigence tester officiel : /directory/ = racine YoupiBanane (via le
	#     symlink www/directory -> YoupiBanane), index youpi.bad_extension,
	#     POST sur *.bla appelle cgi_test ---
	location /directory {
		root                 www;
		client_max_body_size 1g;
		allowed_methods      GET POST;
		autoindex            off;
		index                youpi.bad_extension;
		cgi_pass             .bla /home/eahmeti/Documents/webserv/www/cgi-bin/cgi_test;
	}

	# --- routes de démo / suite de tests maison ---
	location /files {
		root            www;
		autoindex       on;
	}

	location /private {
		root            www;
		autoindex       off;
		allowed_methods GET;
	}

	location /upload {
		root            www;
		allowed_methods GET POST DELETE;
		upload_store    ./www/upload;
		autoindex       on;
	}

	location /tiny {
		root                 www;
		allowed_methods      GET POST;
		upload_store         ./www/upload;
		client_max_body_size 100;
	}

	location /cgi-bin {
		root            www;
		cgi_pass        .py /usr/bin/python3;
		cgi_pass        .sh /usr/bin/bash;
	}

	# Notes d'étude du projet (mindmap + fiches par domaine)
	location /webserv-studies {
		root            www;
		autoindex       on;
		allowed_methods GET;
	}

	location /old-page {
		return 301 /default/index.html;
	}

	location /redirect302 {
		return 302 /default/get.html;
	}
}

# Deuxième serveur : autre port, autre contenu
# (exigence : "listen to multiple ports to deliver different content")
server {
	listen 8081;

	server_name site2;

	client_max_body_size 1m;

	root www/default/site2;

	location / {
		root            www/default/site2;
		index           index.html;
		allowed_methods GET;
	}
}