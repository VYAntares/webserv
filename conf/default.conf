	server { 

		listen	7001;
		listen	localhost:8082;
		listen	0.0.0.0:8081;

		server_name test;

		client_max_body_size 50m;

		error_page 501 502 503 /test.html;
		error_page 400 402 /lol.html;

		location / { 
			root            /var/www/html;
			index			test.html;
			autoindex       off;
			allowed_methods GET;
		}

		location /upload {
			allowed_methods	POST;
			root            /var/www;
			upload_store 	./uploads;
		}

		location /api/bli { 
			root            /var/www/api;
			autoindex       off;
			return          500;
		}

		location /api/bli/bla/blou { 
			root            /var/www/api;
			autoindex       off;
			return          500;
		}

		location /files {
			root            /var/www/shared;
			autoindex       on;
		}

		location /old-page {
			return 500 test;
		}

		location /cgi-bin {
			root            /var/www/cgi-bin;
		}
	}

	# Deuxième serveur sur port 8081
	server {
	listen 8084;
	client_max_body_size 1m;

	location / {
		return 500;
	}
}