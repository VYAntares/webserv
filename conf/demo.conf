# =============================================================================
# demo.conf — configuration de démonstration / évaluation
#
# Superset de default.conf : mêmes routes, plus les routes nécessaires à la
# suite de tests HTML (www/default/) et aux scripts de tests (tests/).
#
#   Usage :            ./webserv conf/demo.conf
#   Suite de tests :   http://localhost:8080/default/
#   Deuxième serveur : http://localhost:8081/   (contenu différent)
# =============================================================================

server {
	listen 8080;

	server_name demo;

	client_max_body_size 10m;

	root www;

	# Pages d'erreur personnalisées (chemin absolu, ouvert tel quel par le serveur)
	error_page 400 /home/antares/Documents/webserv/www/default/errors/400.html;
	error_page 403 /home/antares/Documents/webserv/www/default/errors/403.html;
	error_page 404 /home/antares/Documents/webserv/www/default/errors/404.html;
	error_page 405 /home/antares/Documents/webserv/www/default/errors/405.html;
	error_page 413 /home/antares/Documents/webserv/www/default/errors/413.html;
	error_page 431 /home/antares/Documents/webserv/www/default/errors/431.html;
	error_page 500 /home/antares/Documents/webserv/www/default/errors/500.html;
	error_page 501 /home/antares/Documents/webserv/www/default/errors/501.html;
	error_page 502 /home/antares/Documents/webserv/www/default/errors/502.html;
	error_page 504 /home/antares/Documents/webserv/www/default/errors/504.html;

	# Site statique : GET uniquement
	location / {
		root            www;
		index           index.html;
		autoindex       off;
		allowed_methods GET;
	}

	# Listing de répertoire (autoindex)
	location /files {
		root            www;
		autoindex       on;
	}

	# Répertoire protégé : autoindex off + pas d'index => 403 sur le listing
	location /private {
		root            www;
		autoindex       off;
		allowed_methods GET;
	}

	# Upload (multipart + body brut) et suppression
	location /upload {
		root            www;
		allowed_methods GET POST DELETE;
		upload_store    ./www/upload;
		autoindex       on;
	}

	# Limite de body volontairement minuscule => test 413
	location /tiny {
		root                 www;
		allowed_methods      GET POST;
		upload_store         ./www/upload;
		client_max_body_size 100;
	}

	# CGI : deux types (bonus "multiple CGI types")
	location /cgi-bin {
		root            www;
		cgi_pass        .py /usr/bin/python3;
		cgi_pass        .sh /usr/bin/bash;
	}

	# Redirections
	location /old-page {
		return 301 /default/index.html;
	}

	location /redirect302 {
		return 302 /default/get.html;
	}
}

# Deuxième serveur : autre port, autre contenu
# (exigence : "listen to multiple ports to deliver different content")
server {
	listen 8079;

	server_name site2;

	client_max_body_size 1m;

	root www/default/site2;

	location / {
		root            www/default/site2;
		index           index.html;
		allowed_methods GET;
	}
}
