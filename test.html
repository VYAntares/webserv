<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>42 Webserv Test</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding-top: 80px;
        }

        h1 {
            font-size: 4rem;
            color: #38bdf8;
            animation: pulse 2s infinite;
        }

        p {
            font-size: 1.3rem;
            color: #cbd5e1;
        }

        .card {
            width: 300px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(56,189,248,0.3);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05) rotate(1deg);
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
            transform: scale(1.1);
        }

        .emoji {
            font-size: 5rem;
            margin-top: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .footer {
            margin-top: 100px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0;
            left: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%,100% {
                opacity: 0.2;
            }
            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="stars" id="stars"></div>

    <div class="container">
        <h1>🚀 WEBSERV 42 🚀</h1>

        <p>
            Ton serveur HTTP fonctionne !
        </p>

        <div class="card">
            <h2>GET /index.html</h2>

            <p>
                Si tu vois cette page, ton parsing HTTP marche 😎
            </p>

            <button onclick="changeEmoji()">
                Clique-moi
            </button>

            <div class="emoji" id="emoji">
                🗿
            </div>
        </div>

        <div class="footer">
            Powered by C++98 and suffering.
        </div>
    </div>

    <script>
        const emojis = [
            "🔥",
            "🚀",
            "😎",
            "🗿",
            "💀",
            "👾",
            "🍕",
            "🤯",
            "🐧"
        ];

        function changeEmoji() {
            const emoji = document.getElementById("emoji");

            const random =
                emojis[Math.floor(Math.random() * emojis.length)];

            emoji.innerHTML = random;
        }

        function createStars() {
            const stars = document.getElementById("stars");

            for (let i = 0; i < 120; i++) {
                let star = document.createElement("div");

                star.className = "star";

                star.style.top =
                    Math.random() * 100 + "%";

                star.style.left =
                    Math.random() * 100 + "%";

                star.style.animationDelay =
                    Math.random() * 3 + "s";

                stars.appendChild(star);
            }
        }

        createStars();
    </script>

</body>
	</html>
