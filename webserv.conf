	
	server { 

		listen	7000;

		server_name t b;

		client_max_body_size 50m;

		error_page 501 502 503 test.html;
		error_page 400 402 lol.html;

		location / { 
			root            /var/www/html;
			index			test.html;
			autoindex       off;
		}

		location /api { 
			root            /var/www/api;
			autoindex       off;
			return          500;
		}
		
		location /upload {
			root            /var/www;
		}

		location /files {
			root            /var/www/shared;
			autoindex       on;
		}

		location /old-page {
			return 500 test;
		}

		location /cgi-bin {
			root            /var/www/cgi-bin;
		}
	}

	# Deuxième serveur sur port 8081
	server {
	listen 8084;
	client_max_body_size 1m;

	location / {
		root            /var/www/site2;
		index           index.html;
		autoindex       off;
	
	
	}
	}
