	server { 

		listen	7001;
		listen	localhost:8082;
		listen	0.0.0.0:8081;

		server_name test;

		client_max_body_size 50m;

		error_page 400 402 404 501 502 503 /error.html;
		error_page 500 /lol.html;

		location / { 
			root            /var/www/html;
			index			test.html;
			autoindex       off;
			allowed_methods GET;
		}

		location /upload {
			allowed_methods	POST DELETE;
			root            /var/www;
			upload_store 	./uploads;
			index			successPOST.html;	
		}

		location /api/bli { 
			root            /var/www/api;
			autoindex       on;
			# index			/test.html;
		}

		location /api/bli/bla/blou { 
			root            /var/www/api;
			allowed_methods	GET;
			autoindex       on;
			# return          501 test.html;
		}

		location /files {
			root            /var/www/shared;
			index			/lol.html;
			autoindex       on;
		}

		location /old-page {
			return 500 old;
		}

		location /cgi-bin {
			root            /var/www/;
		}
	}

	# Deuxième serveur sur port 8081
	server {
	listen 8084;
	client_max_body_size 1m;

	location / {
		return 501;
	}
}