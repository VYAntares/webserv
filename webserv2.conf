events {}

# Site prinipal sur le port 8080
http {
	server {
		server_name t;
		listen 8080;	
		
		client_max_body_size 1000g;

	}

	# Deuxième serveur sur port 8081
	server { 
		listen 8080;
		client_max_body_size 1m;

		location / {
			root            /var/www/site2;
			index           index.html;
			autoindex       off;
		
		}
	}
}
