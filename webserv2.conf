events {}

# Site prinipal sur le port 8080
http {
	server {
		server_name t;
		listen 8080;	
		
		client_max_body_size 1000g;
		location /  {
			root            /var/www/html;
			index           index.html;
			autoindex       off;
		}

		location /api {
			autoindex       off;
		}

		location /upload {
			root            /var/www;
		}

		location /files {
			root            /var/www/shared;
			autoindex       on;
		}

		location /old-page {
			return  570 ;
		}

		location /cgi-bin { 
			root            /var/www/cgi-bin;
		}
	}

	# Deuxième serveur sur port 8081
	server { 
		listen 8080;
		client_max_body_size 1m;

		location / {
			root            /var/www/site2;
			index           index.html;
			autoindex       off;
		
		}
	}
}
